name: "Python Cache"
description: "Mise en cache de l'initialisation python"

inputs:
  main-cache-version:
    description: "Version globale du cache"
    required: true
  python-init-cache-version:
    description: "Version du cache d'init python"
    required: true

runs:
  using: "composite" # Permet d'indiquer à github que cette action est une suite de step à executer dans le container
  steps:
    - name: Cache python install
      id: cache-python
      uses: actions/cache@v6
      env:
        cache-name: cache-init
      with:
        path: |
          ./test_env/
        key: ${{ runner.os }}-${{ inputs.main-cache-version }}-python-init-${{ inputs.python-init-cache-version }}-${{ hashFiles('Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-${{ inputs.main-cache-version }}-python-init-${{ inputs.python-init-cache-version }}-
          ${{ runner.os }}-${{ inputs.main-cache-version }}-python-init-
          ${{ runner.os }}-${{ inputs.main-cache-version }}-python-
          ${{ runner.os }}-${{ inputs.main-cache-version }}-
          ${{ runner.os }}-

    - if: ${{ steps.cache-python.outputs.cache-hit != 'true' }}
      shell: bash
      name: Installation de python
      run: make python-init
