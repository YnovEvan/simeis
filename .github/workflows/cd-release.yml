name: CD Release

on:
  pull_request:
    branches:
      - "release/*"
    types:
      - closed # Se dÃĐclenche Ã  la fermeture de la PR

jobs:
  release:
    # On ne fait rien si la PR a ÃĐtÃĐ fermÃĐe sans ÃŠtre mergÃĐe
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write # NÃĐcessaire pour crÃĐer/modifier une release GitHub
      pull-requests: read # NÃĐcessaire pour lister les PRs via gh

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: RÃĐcupÃĐration du code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Historique complet requis pour gh pr list

      - name: Extraire la version depuis le nom de la branche
        id: version
        run: |
          BRANCH="${{ github.base_ref }}"
          VERSION="${BRANCH#release/}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      # Liste toutes les PR mergÃĐes dans cette branche release et les classe
      # par catÃĐgorie selon leur branche source (feature/*, bug/*, autre)
      - name: GÃĐnÃĐrer le changelog
        id: changelog
        run: |
          PRS=$(gh pr list \
            --base "${{ github.base_ref }}" \
            --state merged \
            --json title,url,headRefName \
            --jq '.[]')

          FEATURES=""
          BUGFIX=""
          AUTRE=""

          while IFS= read -r pr; do
            TITLE=$(echo "$pr" | jq -r '.title')
            URL=$(echo "$pr" | jq -r '.url')
            HEAD=$(echo "$pr" | jq -r '.headRefName')
            LINE="- [$TITLE]($URL)"

            if [[ "$HEAD" == feature/* ]]; then
              FEATURES="$FEATURES\n$LINE"
            elif [[ "$HEAD" == bug/* ]]; then
              BUGFIX="$BUGFIX\n$LINE"
            else
              AUTRE="$AUTRE\n$LINE"
            fi
          done <<< "$PRS"

          BODY="## Changelog\n"
          [ -n "$FEATURES" ] && BODY="$BODY\n### Features\n$FEATURES"
          [ -n "$BUGFIX"   ] && BODY="$BODY\n### Bugfix\n$BUGFIX"
          [ -n "$AUTRE"    ] && BODY="$BODY\n### Autre\n$AUTRE"

          # On passe par GITHUB_ENV avec dÃĐlimiteur EOF pour prÃĐserver les sauts de ligne
          {
            echo 'CHANGELOG<<EOF'
            echo -e "$BODY"
            echo 'EOF'
          } >> "$GITHUB_ENV"

  setup-rust:
    name: Setup RUST
    runs-on: ubuntu-latest
    steps:
      - name: RÃĐcupÃĐration du code
        uses: actions/checkout@v6

      - name: Cache rust install
        id: cache-rust
        uses: actions/cache@v4
        env:
          cache-name: cache-init
        with:
          path: |
            ./target/
            ~/.cargo
          key: ${{ runner.os }}-rust-${{ env.cache-name }}-${{ hashFiles('Cargo.lock', 'Makefile') }}
          restore-keys: |
            ${{ runner.os }}-rust-${{ env.cache-name }}-
            ${{ runner.os }}-rust-
            ${{ runner.os }}-

      - if: ${{ steps.cache-rust.outputs.cache-hit != 'true' }}
        name: Installation de rust
        run: |
          make rust-init

      - name: Compiler en mode release
        run: make rust-build-release

      - name: Compiler la documentation PDF
        run: make rust-docu

      - name: CrÃĐation du package debian
        run: |
          mkdir -p ./debian/usr/bin/ # Pour crÃĐer le fichier qui est ignorÃĐ par git car vide
          cp ./target/release/simeis-server ./debian/usr/bin/
          sed -i 's/VERSION/${{ steps.version.outputs.tag }}/g' ./debian/DEBIAN/control

      - name: Compilation en .deb
        run: dpkg-deb --build ./debian .

      # CrÃĐe la release si elle n'existe pas, la met Ã  jour si elle existe dÃĐjÃ .
      # clear_attachments: true remplace les artefacts existants Ã  chaque run, pour ÃĐviter les doublons.
      - name: CrÃĐer ou mettre Ã  jour la release GitHub
        id: create_release
        uses: mini-bomba/create-github-release@v1.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body: ${{ env.CHANGELOG }}
          clear_attachments: true
          files: |
            ./doc/manuel.pdf
            ./doc/swagger.json
            ./doc/swagger-ui.html
            ./simeis_${{ steps.version.outputs.tag }}-1_amd64.deb
