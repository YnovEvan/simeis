name: "CI - Main"

env:
  CARGO_TERM_COLOR: always

on:
  push:
    branches:
      - "*"
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v6

      - name: Installation de rust
        run: make init

      - name: Compilation du projet
        run: make build

      - name: Création de la documentation typst
        run: |
          make docu
