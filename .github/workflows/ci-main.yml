name: "CI - Main"

env:
  CARGO_TERM_COLOR: always

on:
  pull_request:
    branches:
      - "main"

jobs:
  setup-rust:
    name: Setup RUST
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code # Nécessaire pour récupérer le action.yml
        uses: actions/checkout@v6

      - name: Rust cache + build
        uses: ./.github/actions/rust-cache

  quality:
    needs: setup-rust
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v6

      - name: Formatage
        run: make rust-fmt

      - name: Linting
        run: make rust-lint

  tests:
    needs: setup-rust
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v6

      - name: Rust cache + build
        uses: ./.github/actions/rust-cache

      - name: Lancement des tests
        run: make rust-test

  build:
    needs: setup-rust
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v6

      - name: Rust cache + build
        uses: ./.github/actions/rust-cache

      - name: Compilation du projet
        run: make rust-build

      - name: Création de la documentation typst
        run: |
          make rust-docu
