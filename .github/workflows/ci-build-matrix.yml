name: CI - Build matrice

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build (${{ matrix.os }} / Rust ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      # On met à true pour que le workflow s'arrête dès qu'une tâche échoue
      # Evite de gâcher des ressources car on build pour une release
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: ["1.75.0", "1.80.0", "1.85.0", "1.88.0"]

    steps:
      - name: Récupération du code
        uses: actions/checkout@v6

      - name: Installation de Rust ${{ matrix.rust }}
        run: |
          rustup toolchain install ${{ matrix.rust }}
          rustup default ${{ matrix.rust }}

      - name: Log de la version de Rust installée (vérification)
        run: rustc --version

      # Le Cargo.lock du repo peut être en version 4 (Rust >= 1.78), incompatible
      # avec les anciennes versions de la matrice (1.75.0, 1.80.0).
      # On le supprime pour laisser Cargo le régénérer dans le format adapté.
      - name: Suppression du Cargo.lock pour compatibilité cross-version
        run: rm -f Cargo.lock

      - name: Build release
        run: cargo build --release --verbose
