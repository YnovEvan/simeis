name: CI - Build matrice

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build (${{ matrix.os }} / Rust ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      # On met à true pour que le workflow s'arrête dès qu'une tâche échoue
      # Evite de gâcher des ressources car on build pour une release
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: ["1.75.0", "1.80.0", "1.85.0", "1.88.0"]

    steps:
      - name: Récupération du code
        uses: actions/checkout@v6

      - name: Installation de Rust ${{ matrix.rust }}
        run: |
          rustup toolchain install ${{ matrix.rust }}
          rustup default ${{ matrix.rust }}

      - name: Log de la version de Rust installée (vérification)
        run: rustc --version

      # Le Cargo.lock généré par Rust >= 1.78 utilise le format version 4,
      # illisible par les anciennes versions de Cargo (< 1.78).
      # On le rétrograde en version 3 (rétrocompatible) pour que tous les jobs
      # de la matrice puissent lire les versions exactes pinchées.
      - name: Rétrogradation du Cargo.lock v4 → v3 pour compatibilité cross-version
        run: sed -i 's/^version = 4$/version = 3/' Cargo.lock

      - name: Build release
        run: cargo build --release --verbose
