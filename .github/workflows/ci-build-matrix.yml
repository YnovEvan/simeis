name: CI - Build matrice

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build (${{ matrix.os }} / Rust ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      # On met à true pour que le workflow s'arrête dès qu'une tâche échoue
      # Evite de gâcher des ressources car on build pour une release
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: ["1.75.0", "1.80.0", "1.85.0", "1.88.0"]

    steps:
      - name: Récupération du code
        uses: actions/checkout@v6

      - name: Installation de Rust ${{ matrix.rust }}
        id: rustc-path
        shell: bash
        run: |
          rustup toolchain install ${{ matrix.rust }} --no-self-update
          echo "path=$(rustup which --toolchain ${{ matrix.rust }} rustc)" >> "$GITHUB_OUTPUT"

      - name: Build release
        shell: bash
        run: cargo build --release --verbose
        env:
          RUSTC: ${{ steps.rustc-path.outputs.path }}
