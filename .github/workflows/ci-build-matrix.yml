name: CI - Build matrice

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build (${{ matrix.os }} / Rust ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      # On met à true pour que le workflow s'arrête dès qu'une tâche échoue
      # Evite de gâcher des ressources car on build pour une release
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # 1.75.0, 1.80.0, 1.85.0 exclus : ntex (même en v3.7.0) impose rustc >= 1.88.
        # Le MSRV effectif du projet est donc 1.88.0.
        rust: ["1.88.0"]

    steps:
      - name: Récupération du code
        uses: actions/checkout@v6

      - name: Installation de Rust ${{ matrix.rust }}
        run: |
          rustup toolchain install ${{ matrix.rust }}
          rustup default ${{ matrix.rust }}

      - name: Cache cargo # recompile que ce qui a changé grâce aux artefacts dans target/
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-${{ matrix.rust }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.rust }}-

      - name: Log de la version de Rust installée (vérification)
        run: rustc --version

      - name: Build release
        run: cargo build --release --verbose
