name: CI - Quality

env:
  CARGO_TERM_COLOR: always

on:
  pull_request:
    branches:
      - "*"

jobs:
  rust-quality:
    name: Rust quality
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v6

      - name: Installation de rust
        run: make rust-init

      - name: Formatage
        run: make rust-fmt

      - name: Linting
        run: make rust-lint

  python-quality:
    name: Python quality
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v6

      - name: Installation de python
        run: make python-init

      - name: Formatage python
        run: make python-fmt

      - name: Linting python
        run: make python-lint

  python-property-test:
    name: Tests property-based
    runs-on: ubuntu-latest
    concurrency:
      group: property-test-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Récupération du code
        uses: actions/checkout@v6

      - name: Installation de python
        run: make python-init

      - name: Tests property-based
        run: make python-property-test

  tests-coverage:
    name: Vérification couverture de tests
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Récupération du code
        uses: actions/checkout@v6

      - name: Installation de cargo-tarpaulin
        run: cargo install --locked cargo-tarpaulin

      - name: Vérification du coverage
        run: make test-coverage-ci

      - name: Ajout du label si les tests ne passe pas le minimum
        if: failure()
        run: gh pr edit --add-label "not enough tests"
