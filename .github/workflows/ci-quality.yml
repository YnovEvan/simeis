name: CI - Quality

env:
  CARGO_TERM_COLOR: always

on:
  pull_request:
    branches:
      - "*"

jobs:
  setup-py:
    name: Setup PYTHON
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v6

      - name: Python cache
        uses: ./.github/actions/python-cache
        with:
          main-cache-version: ${{ vars.MAIN_CACHE_VERSION }}
          python-init-cache-version: ${{ vars.PYTHON_INIT_CACHE_VERSION }}

  setup-rust:
    name: Setup RUST
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code # Nécessaire pour récupérer le action.yml
        uses: actions/checkout@v6

      - name: Rust cache + build
        uses: ./.github/actions/rust-cache
        with:
          main-cache-version: ${{ vars.MAIN_CACHE_VERSION }}
          rust-init-cache-version: ${{ vars.RUST_INIT_CACHE_VERSION }}
          rust-build-cache-version: ${{ vars.RUST_BUILD_CACHE_VERSION }}

  rust-quality:
    name: Rust quality
    runs-on: ubuntu-latest
    needs: setup-rust
    steps:
      - name: Récupération du code
        uses: actions/checkout@v6

      - name: Rust cache + build
        uses: ./.github/actions/rust-cache
        with:
          main-cache-version: ${{ vars.MAIN_CACHE_VERSION }}
          rust-init-cache-version: ${{ vars.RUST_INIT_CACHE_VERSION }}
          rust-build-cache-version: ${{ vars.RUST_BUILD_CACHE_VERSION }}

      - name: Check
        run: make rust-check

      - name: Formatage
        run: make rust-fmt

      - name: Linting
        run: make rust-lint

  python-quality:
    name: Python quality
    runs-on: ubuntu-latest
    needs: setup-py
    steps:
      - name: Récupération du code
        uses: actions/checkout@v6

      - name: Python cache
        uses: ./.github/actions/python-cache
        with:
          main-cache-version: ${{ vars.MAIN_CACHE_VERSION }}
          python-init-cache-version: ${{ vars.PYTHON_INIT_CACHE_VERSION }}

      - name: Formatage python
        run: make python-fmt

      - name: Linting python
        run: make python-lint

  python-property-test:
    name: Tests property-based
    runs-on: ubuntu-latest
    needs: setup-py
    concurrency:
      group: property-test-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Récupération du code
        uses: actions/checkout@v6

      - name: Python cache
        uses: ./.github/actions/python-cache
        with:
          main-cache-version: ${{ vars.MAIN_CACHE_VERSION }}
          python-init-cache-version: ${{ vars.PYTHON_INIT_CACHE_VERSION }}

      - name: Tests property-based
        run: make python-property-test

  python-functional-test:
    name: Tests functionnal
    needs: [setup-rust, python-property-test]
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v6

      - name: Rust cache + build
        uses: ./.github/actions/rust-cache
        with:
          main-cache-version: ${{ vars.MAIN_CACHE_VERSION }}
          rust-init-cache-version: ${{ vars.RUST_INIT_CACHE_VERSION }}
          rust-build-cache-version: ${{ vars.RUST_BUILD_CACHE_VERSION }}

      - name: Python cache
        uses: ./.github/actions/python-cache
        with:
          main-cache-version: ${{ vars.MAIN_CACHE_VERSION }}
          python-init-cache-version: ${{ vars.PYTHON_INIT_CACHE_VERSION }}

      - name: Tests functionnal
        run: make python-functional-test

  tests-coverage:
    name: Vérification couverture de tests
    runs-on: ubuntu-latest
    needs: setup-rust
    permissions:
      contents: read
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Récupération du code
        uses: actions/checkout@v6

      - name: Rust cache + build
        uses: ./.github/actions/rust-cache
        with:
          main-cache-version: ${{ vars.MAIN_CACHE_VERSION }}
          rust-init-cache-version: ${{ vars.RUST_INIT_CACHE_VERSION }}
          rust-build-cache-version: ${{ vars.RUST_BUILD_CACHE_VERSION }}

      - name: Vérification du coverage
        run: |
          # Lancement du coverage (échoue si inférieur à MIN_COVERAGE & sortie json)
          make test-coverage-ci

          # Récupération du chiffre de coverage
          COVERAGE=$(jq '.coverage' tarpaulin-report.json)

          # Si le coverage n'a pas échoué mais qu'il est inférieur à 50% attribution du label "not enough tests"
          if [ $(echo "$COVERAGE < 50.0" | bc) -eq 1 ] 
          then 
            gh pr edit ${{ github.event.number }} --add-label "not enough tests"
          fi
