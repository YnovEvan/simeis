name: Ci Release

on:
  pull_request:
    branches:
      - "feature/propagate"

jobs:
  on-success:
    # if: ${{ github.event.pull_request.merged }}
    runs-on: ubuntu-latest
    steps:
      - name: Création des PR pour les labels propagate
        run: |
          echo ${{ github.GITHUB_REF_NAME}}
          echo ${{ github.event.pull_request.labels}}
          echo propagate:release/15544555 | cut -d ':' -f 2
