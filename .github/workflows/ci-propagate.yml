name: Ci Release

on:
  # pull_request:
  #   types: [closed]
  push:
    branches:
      - "feature/propagate"

jobs:
  on-success:
    # if: ${{ github.event.pull_request.merged }}
    runs-on: ubuntu-latest
    steps:
      - name: Création des PR pour les labels propagate
        run: |
          tags=$(git describe --tags --all)
          echo "$tags"
          echo "${{ github.GITHUB_REF_NAME}}"
          echo propagate:release/15544555 | cut -d ':' -f 1
