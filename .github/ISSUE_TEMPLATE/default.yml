name: Ticket générique
description: "Modèle de ticket pour suivre une tâche"
title: "TITRE_TICKET"

body:
  - type: markdown
    attributes:
      value: |
        Penser à lier le ticket au projet

  - type: input
    id: branche
    attributes:
      label: "Branche liée"
      placeholder: "Ex: feat/#18-ajout_login"
    validations:
      required: true

  - type: textarea
    id: desc
    attributes:
      label: "Description du ticket"
      description: "Explique les étapes, ou les objectifs"
      value: |
        **En tant que** _
        **je veux** _ 
        **afin que** _
    validations:
      required: true

  - type: textarea
    id: desc_technical
    attributes:
      label: "Description fonctionnelle"
      description: "Explications techniques"
      placeholder: "..."
    validations:
      required: true

  - type: textarea
    id: todo
    attributes:
      label: "Tâches à effectuer"
      description: "Utilise le format Markdown pour cocher les tâches une fois faites."
      value: |
        - [ ] : …
        - [ ] : …
        - [ ] : …
    validations:
      required: true
